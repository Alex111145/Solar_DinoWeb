<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolarDino — Accedi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; }
    .glow { box-shadow: 0 0 40px rgba(251,191,36,.15); }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 40px #1e293b inset !important; -webkit-text-fill-color: #e2e8f0 !important; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-500/20 border border-amber-500/30 mb-4">
        <span class="text-3xl">☀️</span>
      </div>
      <h1 class="text-3xl font-bold text-white">SolarDino</h1>
      <p class="text-slate-400 mt-1 text-sm">Piattaforma AI per ispezione pannelli solari</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 glow">
      <h2 class="text-xl font-semibold text-white mb-6">Accedi al tuo account</h2>

      <div id="errMsg" class="hidden mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm"></div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Email aziendale</label>
          <input
            type="email" id="email" required autocomplete="email"
            placeholder="azienda@email.it"
            class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-600 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <input
            type="password" id="password" required autocomplete="current-password"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-600 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition"
          />
        </div>

        <button
          type="submit" id="submitBtn"
          class="w-full py-3 rounded-xl bg-amber-500 hover:bg-amber-400 text-slate-900 font-semibold text-sm transition-all duration-200 flex items-center justify-center gap-2"
        >
          <span id="btnText">Accedi</span>
          <svg id="spinner" class="hidden animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
        </button>
      </form>

      <div class="mt-6 pt-5 border-t border-slate-700">
        <p class="text-center text-slate-400 text-sm font-medium mb-3">Nuova azienda?</p>
        <a href="/static/register.html"
          class="block w-full py-3 rounded-xl border border-slate-600 hover:border-amber-500/50 bg-slate-700/50 hover:bg-amber-500/10 text-slate-300 hover:text-amber-300 font-semibold text-sm text-center transition">
          Registrati — 1 ortomosaico gratuito
        </a>
      </div>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">
      SolarDino © 2026 — Tecnologia di rilevamento AI MaskDINO
    </p>
  </div>

<script>
  // Se già loggato, redirect
  const tok = localStorage.getItem("token");
  const isAdmin = localStorage.getItem("is_admin") === "true";
  if (tok) {
    window.location.href = isAdmin ? "/static/admin.html" : "/static/dashboard.html";
  }

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn     = document.getElementById("submitBtn");
    const spinner = document.getElementById("spinner");
    const btnText = document.getElementById("btnText");
    const errMsg  = document.getElementById("errMsg");

    btnText.textContent = "Accesso in corso...";
    spinner.classList.remove("hidden");
    btn.disabled = true;
    errMsg.classList.add("hidden");

    try {
      const res = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email:    document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
        }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || "Errore di accesso");
      }

      localStorage.setItem("token",    data.access_token);
      localStorage.setItem("name",     data.name);
      localStorage.setItem("email",    data.email);
      localStorage.setItem("credits",  data.credits);
      localStorage.setItem("is_admin", data.is_admin);

      window.location.href = data.is_admin ? "/static/admin.html" : "/static/dashboard.html";

    } catch (err) {
      errMsg.textContent = err.message;
      errMsg.classList.remove("hidden");
      btnText.textContent = "Accedi";
      spinner.classList.add("hidden");
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
