# fly.toml app configuration file generated for solar-dinoweb on 2026-03-24T09:24:12+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'solar-dinoweb'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile"

[env]
  UPLOAD_DIR = '/tmp/elaborazioni'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "10s"

[[vm]]
  memory = '512mb'
  cpus = 1
