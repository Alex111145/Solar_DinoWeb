services:
  - type: web
    name: solardino-api
    runtime: python
    buildCommand: >
      pip install -r requirements.txt &&
      pip install -r requirements-ml.txt &&
      cd frontend &&
      npm install &&
      npm run build
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PRICE_PER_PANEL
        value: "0.01"
      - key: PRICE_SINGLE_EUR
        value: "49.99"
      - key: PRICE_PACK5_EUR
        value: "219.99"
      - key: PRICE_PACK10_EUR
        value: "399.99"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_SINGLE
        sync: false
      - key: STRIPE_PRICE_PACK5
        sync: false
      - key: STRIPE_PRICE_PACK10
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MODEL_PTH_URL
        sync: false
      - key: FRONTEND_URL
        value: "https://solar-dinoweb.onrender.com"
      - key: UPLOAD_DIR
        value: "/tmp/elaborazioni"
